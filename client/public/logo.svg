    <path d="M10 30 h10 l5 -10 l10 20 l5 -10 h10" stroke="url(#flowGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="30" cy="30" r="24" stroke="url(#flowGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="80" y="45" font-family="'Inter', sans-serif" font-size="32" font-weight="bold" fill="#1e293b">MedFlow</text>
  <text x="215" y="45" font-family="'Inter', sans-serif" font-size="32" font-weight="300" fill="#64748b">EMR</text>
