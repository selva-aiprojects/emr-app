<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Content Group -->
  <g transform="translate(100, 100) scale(0.8)" filter="url(#shadow)">
    <!-- Top Heart (Pink) -->
    <path d="M0 -20 q-25 -25 -40 0 t 40 50 q 25 -50 40 -50 t -40 0" fill="#f43f5e" stroke="#fff" stroke-width="2" transform="translate(0, -40)"/>
    
    <!-- Right Heart (Blue) -->
    <path d="M0 -20 q-25 -25 -40 0 t 40 50 q 25 -50 40 -50 t -40 0" fill="#3b82f6" stroke="#fff" stroke-width="2" transform="rotate(90) translate(0, -40)"/>
    
    <!-- Bottom Heart (Green) -->
    <path d="M0 -20 q-25 -25 -40 0 t 40 50 q 25 -50 40 -50 t -40 0" fill="#10b981" stroke="#fff" stroke-width="2" transform="rotate(180) translate(0, -40)"/>
    
    <!-- Left Heart (Yellow) -->
    <path d="M0 -20 q-25 -25 -40 0 t 40 50 q 25 -50 40 -50 t -40 0" fill="#f59e0b" stroke="#fff" stroke-width="2" transform="rotate(270) translate(0, -40)"/>
    
    <!-- Center Cross (Subtle) -->
    <path d="M-10 0 h20 M0 -10 v20" stroke="#fff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  </g>
</svg>
