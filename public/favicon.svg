<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="url(#faviconGradient)"/>
  
  <!-- Medical cross with Vite lightning -->
  <g transform="translate(16, 16)">
    <!-- Medical cross -->
    <rect x="-6" y="-2" width="12" height="4" rx="2" fill="white"/>
    <rect x="-2" y="-6" width="4" height="12" rx="2" fill="white"/>
    
    <!-- Vite lightning center -->
    <path d="M 0,-4 L -2,-1 L -1,-1 L -1,1 L 1,1 L 0,4 L 2,1 L 1,1 L 1,-1 Z" 
          fill="#60a5fa" opacity="0.9"/>
  </g>
</svg>
