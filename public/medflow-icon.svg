<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="smallLogoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Medical cross with Vite lightning -->
  <g transform="translate(20, 20)">
    <!-- Medical cross -->
    <rect x="-8" y="-3" width="16" height="6" rx="3" fill="url(#smallLogoGradient)"/>
    <rect x="-3" y="-8" width="6" height="16" rx="3" fill="url(#smallLogoGradient)"/>
    
    <!-- Vite lightning center -->
    <path d="M 0,-6 L -3,-1 L -1,-1 L -2,1 L 1,1 L 0,6 L 3,1 L 1,1 L 2,-1 Z" 
          fill="#60a5fa" opacity="0.9"/>
  </g>
</svg>
