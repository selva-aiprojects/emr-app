<svg width="16" height="16" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="faviconGradient16" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="16" height="16" rx="3" fill="url(#faviconGradient16)"/>
  
  <!-- Simplified medical cross with lightning -->
  <g transform="translate(8, 8)">
    <!-- Medical cross -->
    <rect x="-3" y="-1" width="6" height="2" rx="1" fill="white"/>
    <rect x="-1" y="-3" width="2" height="6" rx="1" fill="white"/>
    
    <!-- Lightning center -->
    <path d="M 0,-2 L -1,-0.5 L -0.5,-0.5 L -0.5,0.5 L 0.5,0.5 L 0,2 L 1,0.5 L 0.5,0.5 L 0.5,-0.5 Z" 
