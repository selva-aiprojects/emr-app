<svg width="180" height="180" viewBox="0 0 180 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional gradient definitions -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feFlood flood-color="#1e40af" flood-opacity="0.2"/>
      <feComposite in2="offsetblur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="90" cy="90" r="85" fill="url(#logoGradient)" opacity="0.1"/>
  
  <!-- Main medical cross with Vite lightning integration -->
  <g transform="translate(90, 90)" filter="url(#logoShadow)">
    
    <!-- Medical cross base -->
    <rect x="-25" y="-8" width="50" height="16" rx="8" fill="url(#logoGradient)"/>
    <rect x="-8" y="-25" width="16" height="50" rx="8" fill="url(#logoGradient)"/>
    
    <!-- Vite lightning bolt overlay -->
    <path d="M 0,-20 L -8,-5 L -3,-5 L -5,5 L 3,5 L 0,20 L 8,5 L 3,5 L 5,-5 Z" 
          fill="url(#accentGradient)" 
          opacity="0.9"
          transform="scale(0.8)">
      <animateTransform
        attributeName="transform"
        type="scale"
        values="0.8;0.85;0.8"
        dur="3s"
        repeatCount="indefinite"/>
    </path>
    
    <!-- Center medical plus -->
    <circle cx="0" cy="0" r="6" fill="white" opacity="0.9"/>
    <circle cx="0" cy="0" r="4" fill="url(#accentGradient)"/>
  </g>
  
  <!-- Orbiting elements for medical theme -->
  <g transform="translate(90, 90)">
    <!-- Top orbit element -->
    <circle cx="0" cy="-35" r="3" fill="#60a5fa" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 35"
        to="360 0 35"
        dur="8s"
        repeatCount="indefinite"/>
    </circle>
    
    <!-- Right orbit element -->
    <circle cx="35" cy="0" r="3" fill="#3b82f6" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 -35"
        to="360 0 -35"
        dur="10s"
        repeatCount="indefinite"/>
    </circle>
    
    <!-- Bottom orbit element -->
    <circle cx="0" cy="35" r="3" fill="#2563eb" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 -35"
        to="360 0 -35"
        dur="12s"
        repeatCount="indefinite"/>
    </circle>
    
    <!-- Left orbit element -->
    <circle cx="-35" cy="0" r="3" fill="#1d4ed8" opacity="0.7">
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0 0 35"
        to="360 0 35"
        dur="9s"
        repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- MedFlow text -->
  <text x="90" y="155" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" 
        text-anchor="middle" fill="url(#logoGradient)" letter-spacing="-0.5">
    MedFlow
  </text>
  
  <!-- EMR subtitle -->
  <text x="90" y="170" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="600" 
        text-anchor="middle" fill="#64748b" letter-spacing="2">
    EMR SYSTEM
  </text>
</svg>
