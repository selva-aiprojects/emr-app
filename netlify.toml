# =====================================================
# Netlify Configuration for EMR Application
# =====================================================

[build]
  # Build the React frontend (runs from repo root)
  command   = "npm install && npm run build"
  publish   = "client/dist"
  # Netlify Functions directory
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Bundle functions with esbuild to include all server dependencies
[functions]
  node_bundler = "esbuild"

# =====================================================
# Redirect all /api/* requests to the serverless function
# =====================================================
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/api/:splat"
  status = 200
  force  = true

# =====================================================
# SPA fallback – serve index.html for all other routes
# =====================================================
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
